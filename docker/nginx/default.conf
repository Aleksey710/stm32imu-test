server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    # Простой healthcheck
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
